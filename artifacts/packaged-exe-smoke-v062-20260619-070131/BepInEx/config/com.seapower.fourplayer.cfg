[Network]

## Network transport: LiteNetLib (direct IP) or Steam (P2P with invites)
# Setting type: String
# Default value: LiteNetLib
Transport = LiteNetLib

## Are you the host?
# Setting type: Boolean
# Default value: true
IsHost = false

## Host IP address to connect to (client only)
# Setting type: String
# Default value: 127.0.0.1
HostIP = 127.0.0.1

## Network port
# Setting type: Int32
# Default value: 7777
Port = 7777

## PvP mode: players control opposing sides
# Setting type: Boolean
# Default value: false
PvP = false

## Automatically connect on game start
# Setting type: Boolean
# Default value: false
AutoConnect = false

## Time vote mode: both players must agree on time compression changes
# Setting type: Boolean
# Default value: false
TimeVote = false

[Lobby]

## Name shown in the four-player roster
# Setting type: String
# Default value: CodexSandboxOffline
PlayerName = Packaged EXE Smoke Test

## 0 = automatic, or request slot 2 through 4
# Setting type: Int32
# Default value: 0
PreferredSlot = 0

## 0 = Blue, 1 = Red, 255 = automatic
# Setting type: Int32
# Default value: 255
PreferredTeam = 255

## 0 = Any, 1 = Surface, 2 = Submarine, 3 = Air, 4 = Land
# Setting type: Int32
# Default value: 0
PreferredRole = 0

## Operation name shown in the public launcher lobby browser
# Setting type: String
# Default value: Open Fleet
PublicLobbyName = Open Fleet

[Services]

## Railway lobby directory and telemetry service
# Setting type: String
# Default value: https://spdash-production.up.railway.app
DirectoryUrl = https://spdash-production.up.railway.app

[Sync]

## Host missile state stream rate in Hz (1-60, default 20)
# Setting type: Int32
# Default value: 20
MissileStateHz = 20

## Host unit/torpedo state stream rate in Hz (1-60, default 10)
# Setting type: Int32
# Default value: 10
UnitStateHz = 10
